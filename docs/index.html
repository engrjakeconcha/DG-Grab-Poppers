<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Daddy Grab Super App</title>
    <meta
      name="description"
      content="Daddy Grab Super App mobile jump page for buyers, support, channels, bookings, events, and partner links."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-shell">
        <div class="hero-badge">Daddy Grab Super App</div>
        <div class="hero-logo-wrap">
          <img class="hero-logo" src="./assets/logo.png" alt="Daddy Grab logo" />
        </div>
        <h1 id="greeting">Pick your next stop.</h1>
      </section>

      <section class="tile-grid" aria-label="Daddy Grab destinations">
        <a class="service-tile" href="https://daddygrab.online/store" data-telegram="true">
          <span class="tile-icon tile-green">🛍️</span>
          <span class="tile-title">One Stop Shop</span>
        </a>

        <a class="service-tile" href="https://daddygrab.online/book" data-telegram="true">
          <span class="tile-icon tile-mint">📅</span>
          <span class="tile-title">Book me!</span>
        </a>

        <a class="service-tile" href="https://daddygrab.online/events" data-telegram="true">
          <span class="tile-icon tile-gold">🎟️</span>
          <span class="tile-title">Our Events!</span>
        </a>

        <a class="service-tile" href="https://daddygrab.online/channels" data-telegram="true">
          <span class="tile-icon tile-sage">📣</span>
          <span class="tile-title">Channels</span>
        </a>

        <a class="service-tile" href="https://daddygrab.online/report" data-telegram="true">
          <span class="tile-icon tile-coral">🛟</span>
          <span class="tile-title">Report Issue</span>
        </a>

        <a class="service-tile" href="https://daddygrab.online/track" data-telegram="true">
          <span class="tile-icon tile-soft">📦</span>
          <span class="tile-title">Track my Order</span>
        </a>

        <a class="service-tile" href="https://x.com" data-telegram="true">
          <span class="tile-icon tile-dark">𝕏</span>
          <span class="tile-title">X</span>
        </a>

        <a class="service-tile" href="https://tevi.com" data-telegram="true">
          <span class="tile-icon tile-rose">TV</span>
          <span class="tile-title">Tevi</span>
        </a>

        <a class="service-tile" href="https://jff.com" data-telegram="true">
          <span class="tile-icon tile-sun">JF</span>
          <span class="tile-title">JFF</span>
        </a>
      </section>

      <section class="partners-section">
        <div class="section-head">
          <p class="section-kicker">Partner Placements</p>
          <h2>Here’s our partners</h2>
        </div>

        <div class="partner-marquee" aria-label="Scrolling partner placements">
          <div class="partner-track">
            <a class="partner-image" href="https://x.com"><img src="./assets/partner-x.svg" alt="X partner mock" /></a>
            <a class="partner-image" href="https://tevi.com"><img src="./assets/partner-tevi.svg" alt="Tevi partner mock" /></a>
            <a class="partner-image" href="https://jff.com"><img src="./assets/partner-jff.svg" alt="JFF partner mock" /></a>
            <a class="partner-image" href="https://x.com"><img src="./assets/partner-x.svg" alt="X partner mock duplicate" /></a>
            <a class="partner-image" href="https://tevi.com"><img src="./assets/partner-tevi.svg" alt="Tevi partner mock duplicate" /></a>
            <a class="partner-image" href="https://jff.com"><img src="./assets/partner-jff.svg" alt="JFF partner mock duplicate" /></a>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
