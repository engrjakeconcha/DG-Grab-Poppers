<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Daddy Grab Super App</title>
    <meta
      name="description"
      content="Discreet. Fast. Ready Anytime. Poppers 24 Hours. Order Now!"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-stage">
        <header class="topbar">
          <img class="topbar-logo topbar-logo-hero" src="./assets/hero.jpg" alt="Daddy Grab Super App hero" />
        </header>
      </section>

      <section class="tiles-body">
        <section class="tile-grid" aria-label="Daddy Grab destinations">
        <a class="service-tile" href="https://store.daddygrab.online" data-telegram="true" aria-label="One Stop Shop">
          <img class="tile-icon tile-icon-brand" src="./assets/logo-first-tile.png" alt="" />
        </a>

        <a class="service-tile" href="https://daddygrab.online/book" data-coming-soon="true" data-telegram="true" aria-label="Book me!">
          <img class="tile-icon tile-icon-art" src="./assets/toolkit-book.png" alt="" />
        </a>

        <a class="service-tile" href="https://daddygrab.online/events" data-coming-soon="true" data-telegram="true" aria-label="Our Events!">
          <img class="tile-icon tile-icon-art" src="./assets/toolkit-events.png" alt="" />
        </a>

        <a class="service-tile" href="https://daddygrab.online/channels" data-coming-soon="true" data-telegram="true" aria-label="Channels">
          <img class="tile-icon tile-icon-art" src="./assets/toolkit-channels.png" alt="" />
        </a>

        <a class="service-tile" href="https://store.daddygrab.online/report" data-telegram="true" aria-label="Report Issue">
          <img class="tile-icon tile-icon-art" src="./assets/toolkit-report.png" alt="" />
        </a>

        <a class="service-tile" href="https://store.daddygrab.online/track" data-telegram="true" aria-label="Track my Order">
          <img class="tile-icon tile-icon-art" src="./assets/toolkit-track.png" alt="" />
        </a>

        <a class="service-tile" href="https://x.com" data-coming-soon="true" data-telegram="true" aria-label="X">
          <img class="tile-icon tile-icon-brand" src="./assets/xlogo.jpeg" alt="" />
        </a>

        <a class="service-tile" href="https://tevi.com" data-coming-soon="true" data-telegram="true" aria-label="Tevi">
          <img class="tile-icon tile-icon-brand" src="./assets/tevilogo.jpg" alt="" />
        </a>
        </section>

        <section class="whats-new" aria-label="What's new">
          <div class="section-head section-head-dark">
            <p class="section-kicker section-kicker-dark">What’s New</p>
          </div>

          <div class="updates-grid">
            <a class="update-card update-card-promo" href="https://store.daddygrab.online" data-telegram="true">
              <img class="update-image" src="./assets/toolkit-shop.png" alt="" />
              <div class="update-copy">
                <span class="update-tag">Promo</span>
                <strong>Poppers promo drop</strong>
              </div>
            </a>

            <a class="update-card update-card-event" href="https://daddygrab.online/events" data-telegram="true">
              <img class="update-image" src="./assets/toolkit-events.png" alt="" />
              <div class="update-copy">
                <span class="update-tag">Event</span>
                <strong>Upcoming community night</strong>
              </div>
            </a>
          </div>
        </section>
      </section>

      <section class="partners-section">
        <div class="section-head">
          <p class="section-kicker">Here’s our partners</p>
        </div>

        <div class="partner-marquee" aria-label="Scrolling partner placements">
          <div class="partner-track">
            <a class="partner-image" href="https://x.com"><img src="./assets/partner-x.svg" alt="X partner mock" /></a>
            <a class="partner-image" href="https://tevi.com"><img src="./assets/partner-tevi.svg" alt="Tevi partner mock" /></a>
            <a class="partner-image" href="https://jff.com"><img src="./assets/partner-jff.svg" alt="JFF partner mock" /></a>
            <a class="partner-image" href="https://x.com"><img src="./assets/partner-x.svg" alt="" /></a>
            <a class="partner-image" href="https://tevi.com"><img src="./assets/partner-tevi.svg" alt="" /></a>
            <a class="partner-image" href="https://jff.com"><img src="./assets/partner-jff.svg" alt="" /></a>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
