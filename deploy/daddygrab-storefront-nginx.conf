server {
    listen 80;
    listen [::]:80;
    server_name store.daddygrab.online;

    root /opt/daddygrab-storefront/current;
    index index.html;
    client_max_body_size 15m;

    location = /health {
        proxy_pass http://127.0.0.1:3100/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        try_files /index.html =404;
    }

    location = /checkout {
        try_files /checkout/index.html =404;
    }

    location = /track {
        try_files /track/index.html =404;
    }

    location = /address {
        try_files /address/index.html =404;
    }

    location = /admin {
        try_files /admin/index.html =404;
    }

    location /Assets/ {
        try_files $uri =404;
        access_log off;
        expires 1h;
    }

    location /docs/ {
        try_files $uri =404;
        access_log off;
        expires 1h;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    location /checkout/ {
        try_files $uri $uri/ /checkout/index.html;
    }

    location /track/ {
        try_files $uri $uri/ /track/index.html;
    }

    location /address/ {
        try_files $uri $uri/ /address/index.html;
    }

    location = /app.js {
        try_files /app.js =404;
    }

    location = /styles.css {
        try_files /styles.css =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
