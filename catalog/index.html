<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Daddy Grab Super App Store</title>
    <meta
      name="description"
      content="Discreet. Fast. Ready Anytime. Poppers 24 Hours. Order Now!"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body data-page="catalog">
    <div class="page-shell">
      <header class="hero">
        <div class="hero__glow"></div>
        <div class="hero__copy">
          <img class="hero__billboard" src="/Assets/hero.jpg" alt="Daddy Grab Super App hero" />
          <p id="store-greeting" class="hero__description hero__description--compact hero__description--greeting"></p>
          <div class="hero__actions">
            <a class="cta cta--secondary" href="/">Home</a>
            <button id="copy-link" class="cta cta--secondary" type="button">Copy Store Link</button>
            <button id="go-track" class="cta cta--secondary" type="button">Track Order</button>
            <button id="go-admin" class="cta cta--secondary" type="button">Admin</button>
            <button id="go-checkout" class="cta cta--primary" type="button">Order Now!</button>
            <button id="cart-button" class="cart-button" type="button" data-go-checkout aria-label="Open cart and checkout">
              <span class="cart-button__count" id="cart-count">0</span>
            </button>
          </div>
        </div>
      </header>

      <main class="catalog">
        <section class="toolbar">
          <div class="search-wrap">
            <label class="sr-only" for="search">Search products</label>
            <input id="search" type="search" placeholder="Search product, category, or keyword" />
          </div>
          <div class="filters" id="filters"></div>
        </section>

        <section class="catalog-grid" id="product-grid" aria-live="polite"></section>
      </main>
    </div>

    <template id="product-card-template">
      <article class="product-card">
        <div class="product-card__media">
          <img class="product-card__image" alt="" loading="lazy" />
        </div>
        <div class="product-card__body">
          <h2 class="product-card__title"></h2>
          <div class="product-card__footer">
            <strong class="product-card__price"></strong>
            <button class="product-card__button" type="button">Add to Cart</button>
          </div>
        </div>
      </article>
    </template>

    <section id="quick-view" class="product-quickview" hidden>
      <button class="product-quickview__backdrop" type="button" data-quickview-close aria-label="Close quick view"></button>
      <div class="product-quickview__card" role="dialog" aria-modal="true" aria-labelledby="quick-view-title">
        <button class="product-quickview__close" type="button" data-quickview-close aria-label="Close quick view">×</button>
        <div class="product-quickview__media">
          <img id="quick-view-image" class="product-quickview__image" alt="" />
        </div>
        <div class="product-quickview__copy">
          <p id="quick-view-category" class="product-quickview__category"></p>
          <h2 id="quick-view-title"></h2>
          <p id="quick-view-description" class="product-quickview__description"></p>
          <div class="product-quickview__meta">
            <strong id="quick-view-price"></strong>
            <span id="quick-view-stock"></span>
          </div>
          <div class="product-quickview__actions">
            <button id="quick-view-add" class="cta cta--primary" type="button">Add to Cart</button>
            <button class="cta cta--secondary" type="button" data-quickview-close>Close</button>
          </div>
        </div>
      </div>
    </section>

    <section id="cart-toast" class="cart-toast" hidden aria-live="polite">
      <div class="cart-toast__card">
        <div class="cart-toast__copy">
          <strong id="cart-toast-title">Added to cart</strong>
          <p id="cart-toast-message"></p>
        </div>
        <div class="cart-toast__actions">
          <button id="cart-toast-continue" class="cta cta--secondary" type="button">Continue Shopping</button>
          <button id="cart-toast-checkout" class="cta cta--primary" type="button">Go to Checkout</button>
        </div>
      </div>
    </section>

    <script src="/app.js" defer></script>
  </body>
</html>
