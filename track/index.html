<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="google-site-verification" content="ItvR5Orl-4MMR4opiEah746h00E1PUdTBqelofNcEW4" />
    <title>Daddy Grab Order Tracking</title>
    <meta name="description" content="Discreet. Fast. Ready Anytime. Poppers 24 Hours. Order Now!" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S4DVF8R0V7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", "G-S4DVF8R0V7");
    </script>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body data-page="track">
    <div class="page-shell">
      <header class="hero hero--checkout">
        <div class="hero__glow"></div>
        <div class="hero__copy">
          <p class="eyebrow" id="store-badge">Order Tracking</p>
          <h1 id="store-title">Track your Daddy Grab order</h1>
          <p id="store-description" class="hero__description">Discreet. Fast. Ready Anytime.</p>
          <div class="hero__actions">
            <a class="cta cta--secondary" href="/">Home</a>
            <button id="back-to-catalog" class="cta cta--secondary" type="button">Back to Store</button>
          </div>
        </div>
      </header>

      <main class="catalog">
        <section class="checkout-shell checkout-shell--catalog">
          <div class="checkout-shell__summary">
            <div class="checkout-shell__head">
              <p class="eyebrow">Tracking</p>
              <h2>Order Status</h2>
            </div>
            <form id="tracking-form" class="checkout-form tracking-form">
              <div class="form-grid">
                <label class="field">
                  <span>Order Number</span>
                  <input name="order_id" type="text" placeholder="DG-..." />
                </label>
                <label class="field">
                  <span>Telegram Username</span>
                  <input name="telegram_username" type="text" placeholder="@username" />
                </label>
              </div>
              <label class="field">
                <span>Phone Number</span>
                <input name="phone" type="text" inputmode="tel" placeholder="09XXXXXXXXX" />
              </label>
              <button class="cta cta--primary" type="submit">Track Order</button>
            </form>
            <div id="tracking-status" class="tracking-card">Loading your order status...</div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
